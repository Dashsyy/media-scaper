services:
  media-scraper:
    build:
      context: .
    image: media-scraper:0.1.0
    container_name: media-scraper
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgres://media_scraper:media_scraper@postgres:5432/media_scraper
      DEFAULT_OUTPUT_DIR: /app/downloads
      STATIC_DIR: /app/public
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: media-scraper-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: media_scraper
      POSTGRES_PASSWORD: media_scraper
      POSTGRES_DB: media_scraper
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_scraper -d media_scraper"]
      interval: 5s
      timeout: 5s
      retries: 5
