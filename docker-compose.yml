services:
  media-scraper:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL}
    image: media-scraper:0.1.0
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgres://media_scraper:media_scraper@postgres:5432/media_scraper
      DEFAULT_OUTPUT_DIR: /app/downloads
      STATIC_DIR: /app/public
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: media_scraper
      POSTGRES_PASSWORD: media_scraper
      POSTGRES_DB: media_scraper
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
